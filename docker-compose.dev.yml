services:
  firefly-mcp:
    build:
      context: .
      network: host
    image: firefly-iii-mcp:dev
    container_name: firefly_mcp_dev
    hostname: fireflymcp
    network_mode: host
    environment:
      FIREFLY_URL: ${FIREFLY_URL}
      FIREFLY_TOKEN: ${FIREFLY_TOKEN}
      ALLOWED_TAGS: ${ALLOWED_TAGS}
      MCP_TRANSPORT: http
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://localhost:3000/health
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
